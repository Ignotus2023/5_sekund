name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Akcje przypięte do SHA (nie do mutowalnych tagów) — zapobiega
      # przejęciu pipeline'u przez nadpisany tag. Dependabot (.github/
      # dependabot.yml) automatycznie podbije SHA i komentarz wersji.
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Type-check przed buildem — szybki, ostry sygnał regresji TS-owej.
      # `npm run build` też uruchamia tsc, ale wprost wywołane jasno komunikuje
      # cel kroku w logach Actions.
      - name: Lint (TypeScript)
        run: npm run lint

      # Testy jednostkowe Vitest — uruchamiane PRZED audytem i buildem, żeby
      # szybko sygnalizować regresje w sanitize/tier/useTimer/useTurn.
      - name: Tests (Vitest)
        run: npm test

      # Audit zależności na produkcyjnym subset. `--omit=dev` żeby high w narzędziach
      # dev (które nie idą do bundla) nie blokowały deployu — krytyczne CVE w runtime
      # zablokują pipeline. Próg: `high` lub wyższe.
      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@decdde0ac072f6dcbe43649d82d9c635fff5b4e4 # v4.0.4
